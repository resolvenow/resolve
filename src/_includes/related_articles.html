<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap');

  .related-posts {
    --lb-bg: #ffffff;
    --lb-card-bg: #ffffff;
    --lb-card-border: #e9e9e9;
    --lb-card-shadow: 0 2px 12px rgba(0,0,0,0.06);
    --lb-card-shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
    --lb-accent: #2563eb;
    --lb-accent-light: #eff4ff;
    --lb-text: #111827;
    --lb-muted: #6b7280;
    --lb-divider: #f0f0f0;
    --lb-radius: 12px;

    background: var(--lb-bg);
    padding: 5rem 2rem 2rem;
    font-family: 'Outfit', sans-serif;
  }

  /* ... rest of your CSS unchanged ... */
</style>

<section class="related-posts">
  <div class="related-posts__inner">

    <div class="related-posts__header">
      <div class="related-posts__eyebrow">Keep reading</div>
      <h2 class="related-posts__heading">Related Guides</h2>
    </div>

    <div class="related-posts__list">
        {% for post in relatedPosts %}
        <a href="{{ post.url }}" class="rp-card">
        <div class="rp-card__top">
            <span class="rp-card__label">{{ post.label }}</span>
            <h3 class="rp-card__title">{{ post.title }}</h3>
        </div>
        <div class="rp-card__footer">
            <span class="rp-card__cta">
            Read guide
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </span>
        </div>
        </a>
        {% endfor %}
    </div>

  </div>
  <div class="related-posts__divider"></div>
</section>
