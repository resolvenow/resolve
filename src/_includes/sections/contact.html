<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Section</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #faf9f7; font-family: 'DM Sans', sans-serif; }

  /* ── Section ─────────────────────────────────── */
  .contact {
    padding: 120px 24px;
    background: #faf9f7;
    position: relative;
    overflow: hidden;
  }

  .contact::before,
  .contact::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
  }
  .contact::before {
    width: 480px; height: 480px;
    background: radial-gradient(circle, #d6e4ff 0%, transparent 70%);
    top: -100px; left: -140px;
    opacity: .5;
  }
  .contact::after {
    width: 360px; height: 360px;
    background: radial-gradient(circle, #ffe8d8 0%, transparent 70%);
    bottom: -80px; right: -100px;
    opacity: .55;
  }

  /* ── Layout ──────────────────────────────────── */
  .contact-container {
    position: relative;
    max-width: 1080px;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 72px;
    align-items: start;
  }

  /* ── Left ────────────────────────────────────── */
  .contact-info { padding-top: 8px; }

  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #bf5e25;
    margin-bottom: 20px;
  }
  .section-tag::before {
    content: '';
    display: block;
    width: 24px; height: 2px;
    background: #bf5e25;
    border-radius: 2px;
  }

  .contact-info h2 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.5rem, 4.5vw, 3.6rem);
    line-height: 1.08;
    color: #111;
    margin-bottom: 18px;
  }
  .contact-info h2 em {
    font-style: italic;
    color: #bf5e25;
  }

  .contact-info > p {
    font-size: 0.98rem;
    color: #6e6e6e;
    line-height: 1.8;
    max-width: 340px;
    margin-bottom: 44px;
  }

  /* Detail cards */
  .contact-details { display: flex; flex-direction: column; gap: 12px; }

  .detail-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: #fff;
    border: 1.5px solid #ede8e0;
    border-radius: 14px;
    transition: box-shadow .22s ease, transform .22s ease;
  }
  .detail-item:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,.07);
    transform: translateY(-2px);
  }

  .detail-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: linear-gradient(135deg, #fff3eb, #fde8d5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .detail-icon svg { width: 16px; height: 16px; stroke: #bf5e25; }

  .detail-text .label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #b0a89e;
    display: block;
    margin-bottom: 2px;
  }
  .detail-text .value {
    font-size: 0.88rem;
    color: #1a1a1a;
  }

  /* ── Right — Form ────────────────────────────── */
  .contact-form {
    background: #fff;
    padding: 46px 42px;
    border-radius: 26px;
    border: 1.5px solid #ede8e0;
    box-shadow: 0 24px 64px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
    position: relative;
  }

  /* Top accent bar */
  .contact-form::before {
    content: '';
    position: absolute;
    top: 0; left: 36px; right: 36px; height: 3px;
    background: linear-gradient(90deg, #bf5e25 0%, #f09a60 100%);
    border-radius: 0 0 3px 3px;
  }

  .form-header { margin-bottom: 30px; }
  .form-header h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    color: #111;
    margin-bottom: 5px;
  }
  .form-header p { font-size: 0.85rem; color: #a0a0a0; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-group { position: relative; margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: #a09898;
    margin-bottom: 7px;
  }

  .contact-form input,
  .contact-form textarea {
    width: 100%;
    padding: 13px 15px;
    border-radius: 12px;
    border: 1.5px solid #e8e2da;
    background: #faf9f7;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    color: #111;
    transition: border-color .2s, background .2s, box-shadow .2s;
  }
  .contact-form input::placeholder,
  .contact-form textarea::placeholder { color: #c8c0b6; }

  .contact-form input:focus,
  .contact-form textarea:focus {
    outline: none;
    border-color: #bf5e25;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(191,94,37,.09);
  }

  .contact-form textarea { resize: vertical; min-height: 118px; }

  /* Submit */
  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 15px 24px;
    border: none;
    border-radius: 13px;
    background: #141414;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: .04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .25s, transform .18s, box-shadow .25s;
  }
  .btn-submit:hover {
    background: #bf5e25;
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(191,94,37,.3);
  }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit svg {
    width: 15px; height: 15px;
    stroke: #fff; fill: none;
    stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform .2s;
  }
  .btn-submit:hover svg { transform: translateX(4px); }
  .btn-submit:disabled { opacity: .65; cursor: not-allowed; }

  /* Toast */
  .success-toast {
    display: none;
    align-items: center;
    gap: 10px;
    background: #edfdf6;
    border: 1.5px solid #a7f3d0;
    border-radius: 12px;
    padding: 13px 16px;
    margin-top: 14px;
    font-size: 0.86rem;
    color: #065f46;
  }
  .success-toast.show { display: flex; }
  .success-toast svg { width: 17px; height: 17px; stroke: #059669; flex-shrink: 0; }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 840px) {
    .contact-container { grid-template-columns: 1fr; gap: 44px; }
    .contact-info > p { max-width: 100%; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 460px) {
    .contact-form { padding: 32px 22px; }
    .contact-form::before { left: 22px; right: 22px; }
  }
</style>
</head>
<body>

<section id="contact" class="contact">
  <div class="contact-container">

    <!-- Info -->
    <div class="contact-info">
      <span class="section-tag">Contact Us</span>
      <h2>Let's <em>Talk</em></h2>
      <p>Have a question or need professional guidance? Fill out the form and our team will get back to you shortly.</p>

      <div class="contact-details">

        <div class="detail-item">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="detail-text">
            <span class="label">Email</span>
            <span class="value">service@resolvenow.co.in</span>
          </div>
        </div>

        <div class="detail-item">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.08 2.18 2 2 0 012.07 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/>
            </svg>
          </div>
          <div class="detail-text">
            <span class="label">Phone</span>
            <span class="value">+91 9451210865</span>
          </div>
        </div>

        <div class="detail-item">
          <div class="detail-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="detail-text">
            <span class="label">Location</span>
            <span class="value">Kanpur, India</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Form -->
    <form class="contact-form" id="contact-form" novalidate>
      <div class="form-header">
        <h3>Send a Message</h3>
        <p>We typically reply within 24 hours.</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="user_name">Your Name</label>
          <input type="text" id="user_name" name="user_name" placeholder="Rahul Sharma" required>
        </div>
        <div class="form-group">
          <label for="user_email">Email Address</label>
          <input type="email" id="user_email" name="user_email" placeholder="rahul@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us how we can help you…" required></textarea>
      </div>

      <button type="submit" class="btn-submit">
        Send Message
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

      <div class="success-toast" id="success-toast">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Thank you! We'll be in touch shortly.
      </div>
    </form>

  </div>
</section>

<script>
const contactForm = document.getElementById("contact-form");
const successToast = document.getElementById("success-toast");

contactForm.addEventListener("submit", function (e) {
  e.preventDefault();

  const btn = contactForm.querySelector(".btn-submit");
  btn.innerHTML = 'Sending…';
  btn.disabled = true;

  const formData = new FormData(contactForm);

  fetch("https://script.google.com/macros/s/AKfycbyWAKVN_5ZYFuUaciJxFn358jPlknh04Bxv-3PFrZrZeagQXVK72vr0N4Bp7zpm0vCJVg/exec", {
    method: "POST",
    body: formData
  })
  .then(() => {
    contactForm.reset();
    successToast.classList.add("show");
    btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    btn.disabled = false;
    setTimeout(() => successToast.classList.remove("show"), 5000);
  })
  .catch(() => {
    alert("Something went wrong. Please try again later.");
    btn.innerHTML = 'Send Message <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    btn.disabled = false;
  });
});
</script>

</body>
</html>
